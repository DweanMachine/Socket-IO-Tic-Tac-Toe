<!-- Tic Tac Toe Game -->
<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id=all-content>
        <h3 id="username"></h3>
        <h5 id="role"></h5>
        <div id="game-message"></div>
        <div id="board">
            <div class="cell" data-index="0"></div>
            <div class="cell" data-index="1"></div>
            <div class="cell" data-index="2"></div>
            <div class="cell" data-index="3"></div> 
            <div class="cell" data-index="4"></div>
            <div class="cell" data-index="5"></div>
            <div class="cell" data-index="6"></div>
            <div class="cell" data-index="7"></div> 
            <div class="cell" data-index="8"></div>
        </div>
        <br>
        <div id="connections">
            <button id="forfeit">Forfeit</button>
            <button id="toggle-btn">Disconnect</button>
        </div>
    </div>
    <style>
        #all-content {
            justify-content: center;
            align-items: center;
            display: flex;
            flex-direction: column;
        }
        body {
            font-family: Arial, sans-serif;
            background-image: linear-gradient(135deg, orange, indigo);
            background-attachment: fixed;
            color: white;
        }
        #board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 5px;
            margin-top: 20px;
        }
        #connections {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }
        .cell {
            width: 100px;
            height: 100px;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            border: 2px solid #bbb;
            border-radius: 2px;
            cursor: pointer;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .cell:hover {
            background-color: rgba(255, 255, 255, 0.35);
        }
        button {
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        h5 {
            color: #ccc;
        }
        #game-message {
            min-height: 24px;
            font-size: 14px;
            color: #fff;
            margin-top: 8px;
            text-align: center;
        }
    </style>
    <script src="/socket.io/socket.io.js"></script>
    <script> 
        //Client Side JavaScript 
        const socket = io({
            auth: {
                serverOffset: 0
            }
        });

        const cells = document.querySelectorAll('.cell');
        const roomId = sessionStorage.getItem('room');
        const role = sessionStorage.getItem('role');
        (role == 'X' ? opponentRole = 'O' : opponentRole = 'X')
        var isMyTurn = (role === 'X'); //X always starts first

        const username = sessionStorage.getItem('username');

        cells.forEach(cell => {
            cell.addEventListener('click', (e) => {
                if (!isMyTurn) {
                    showMessage("It's not your turn!");
                    return;
                }
                if (e.target.textContent === '' && isMyTurn) {
                    cell.textContent = role;
                    socket.emit('move', { index: e.target.dataset.index, username: sessionStorage.getItem('username'),  elementText: e.target.textContent });
                }

                const winningCombinations = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8], //row win-conditions
                    [0, 3, 6], [1, 4, 7], [2, 5, 8], //column win-conditions
                    [0, 4, 8], [2, 4, 6]             //diagonal win-conditions
                ];
               
                if (winningCombinations.some(combination => combination.every(index => cells[index].textContent === role))) {
                    socket.emit('gameOver', {username: sessionStorage.getItem('username')});
                } else if (winningCombinations.some(combination => combination.every(index => cells[index].textContent === opponentRole))) {
                    socket.emit('gameOver', {username: sessionStorage.getItem('username')});
                } else if (Array.from(cells).every(cell => cell.textContent !== '')) {
                    socket.emit('gameOver', {username: "draw"});
                }
            });
        });

        socket.on('gameOver', (data) => {
            if (data.winner === username) {
                showMessage("Congratulations! You won the game!");
            } else if (data.winner === "draw") {
                showMessage("It's a draw! Nobody wins!");
            } else {
                showMessage("Sorry, you lost. Better luck next time!");
            }
            cells.forEach(cell => cell.textContent = '');
            if (role === 'X') {
                isMyTurn = true; //X always starts first
            } else {
                isMyTurn = false;
            }
        });

        socket.on('opponentMove', (data) => {
            //Handle the move on opponent's side
            const targetCell = document.querySelector(`.cell[data-index="${data.move.index}"]`);
            targetCell.textContent = role === 'X' ? 'O' : 'X'; //Display the opponent's move
            console.log("Opponent moved at cell index:", data.move.index);
            socket.emit('switchTurn', { username: sessionStorage.getItem('username'), index: data.move.index });
        });
        
        socket.on('switchTurn', (data) => {
            console.log("Switching turn:", data);
            if (data.username === username) {
                console.log("It's your turn!"); //Player's turn
                isMyTurn = true;
            } else {
                console.log("Waiting for opponent's turn..."); //Opponent's turn
                isMyTurn = false;
            }
        });

        const usernameDisplay = document.getElementById('username');
        usernameDisplay.innerText = `Username: ${username}`;

        const roleDisplay = document.getElementById('role');
        roleDisplay.innerText = `You are: ${role}`;

        const toggleButton = document.getElementById('toggle-btn');

        toggleButton.addEventListener('click', (e) => {
            e.preventDefault();
            if (socket.connected) {
                toggleButton.innerText = 'Connect';
                socket.disconnect();
            } else {
                toggleButton.innerText = 'Disconnect';
                socket.connect();
            }
        });
        
        const forfeitButton = document.getElementById('forfeit');
        // On the forfeiting client, emit and then redirect
        forfeitButton.addEventListener('click', () => {
            socket.emit('forfeitGame', { username });
            window.location.href = '/wait?username=' + encodeURIComponent(username);
        });

        // On the winning client
        socket.on('forfeitGame', (data) => {
            showMessage(`${data.username} forfeited. You win!`);
            setTimeout(() => {
                window.location.href = '/wait?username=' + encodeURIComponent(username);
            }, 2000); // brief delay so they can read the message
        });
    
        socket.on('disconnect', (reason) => {
            //console.log('Disconnected from server');
            window.location.href = '/wait?username=' + encodeURIComponent(username); 
            console.log('Disconnected from server. Reason:', reason);
        });

        socket.on('forfeitGame', (data) => {
            showMessage(`${data.username} has forfeited the game. You win!`);
            cells.forEach(cell => cell.textContent = '');
            if (role === 'X') {
                isMyTurn = true; //X starts first
            } else {
                isMyTurn = false;
            }
        });

        socket.on('connect', () => {
            socket.emit('passUsername', { username, page: 'Game' });
            socket.emit('rejoinRoom', { username, roomId });
        });

        function showMessage(msg) {
            const messageWindow = document.getElementById('game-message');
            messageWindow.innerText = msg;
            setTimeout(() => messageWindow.innerText = '', 3000); //clears after 3 seconds
        }
    </script>
</body>
</html>
